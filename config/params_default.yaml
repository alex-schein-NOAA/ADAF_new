# Comprehensive ADAF parameter configuration
# Consolidates all parameters from train.py and inference.py
# No default values; set all parameters manually

# Base configuration - used to select this config section
base_config: &BASE_CONFIG

  # ============================================================================
  # TRAINING PARAMETERS
  # ============================================================================
  max_epochs: 100
  batch_size: 12 
  num_data_workers: 4
  save_checkpoint: True
  save_model_freq: 1 
  valid_frequency: 10 #Should be about 10% of max_epochs
  optimizer_type: "AdamW" # Adam, FusedAdam, SWA
  scheduler: "ReduceLROnPlateau" # ReduceLROnPlateau, MultiplicativeLR
  scheduler_patience: 20
  lr_reduce_factor: 0.65
  lr: 2E-3
  local_rank: -1 #to throw errors if scripts don't properly set this up
  world_rank: -1 #to throw errors if scripts don't properly set this up
  

  # ============================================================================
  # DATA PATHS AND SPECIFICATIONS
  # ============================================================================
  data_path: "/scratch5/BMC/ai-datadepot/projects/aschein/ADAF_new/data"
  train_data_path: "/scratch5/BMC/ai-datadepot/projects/aschein/ADAF_new/data/train_data"
  valid_data_path: "/scratch5/BMC/ai-datadepot/projects/aschein/ADAF_new/data/valid_data"
  test_data_path: "/scratch5/BMC/ai-datadepot/projects/aschein/ADAF_new/data/test_data"
  
  experiment_dir: "/scratch3/BMC/wrfruc/aschein/ADAF_new/exp"
  checkpoint_path: "/scratch3/BMC/wrfruc/aschein/ADAF_new/data/exp/training_checkpoints/ckpt.tar"
  best_checkpoint_path: "/scratch3/BMC/wrfruc/aschein/ADAF_new/data/exp/training_checkpoints/best_ckpt.tar"
  
  # Input/output variables and channels
  inp_hrrr_vars: ["hrrr_sp", "hrrr_q", "hrrr_t", "hrrr_u10", "hrrr_v10"] #edit this if sp is no longer used
  # inp_satelite_vars: #Unused for now
  inp_obs_vars: ["sta_p", "sta_q", "sta_t", "sta_u10", "sta_v10"] #edit this if p is no longer used
  field_tar_vars: ["rtma_sp", "rtma_q", "rtma_t", "rtma_u10", "rtma_v10"] #edit this if sp is no longer used
  target_vars: ["sp", "q", "t", "u10", "v10"] #edit this if sp is no longer used

  # Data processing
  obs_time_window: 3 
  

  # ============================================================================
  # MODEL ARCHITECTURE
  # ============================================================================
  upscale: 1
  in_chans: 21 #edit if no longer using surface pressure
  out_chans: 5 #edit if no longer using surface pressure
  img_size_x: 1280
  img_size_y: 512
  window_size: 4
  patch_size: 4
  num_feat: 64
  drop_rate: 0.1
  drop_path_rate: 0.1
  attn_drop_rate: 0.1
  ape: False
  patch_norm: True
  use_checkpoint: False
  resi_connection: "1conv"
  qkv_bias: True
  qk_scale: None
  img_range: 1.
  depths: [3]
  embed_dim: 64 # need be divisible by num_heads
  num_heads: [4] # [16]
  mlp_ratio: 2 # 2
  upsampler: "pixelshuffle"


  # ============================================================================
  # TRAINING SPECIFICS
  # ============================================================================
  target: "analysis_obs" #"obs" "analysis"
  hold_out_obs: True
  hold_out_obs_ratio: 0.1
  learn_residual: True
  obs_mask_seed: 0
  seed: 0 #(2026-06-11) Currently only used in inference.py
  resuming: False
  enable_amp: True 
  log_to_screen: True


  # ============================================================================
  # NORMALIZATION
  # (2026-06-11) Currently only used in inference.py - might remove later
  # ============================================================================
  norm_type: "variable_wise_ignore_extreme" # options: channel_wise, variable_wise, variable_wise_ignore_extreme
  normalization: "minmax_ignore_extreme" # options: minmax, zscore, minmax_ignore_extreme, scale


# ============================================================================
# NAMED CONFIGURATION SECTIONS (one for each network type/experiment)
# Use with: YParams(config_file, section_name)
# ============================================================================

EncDec:
  <<: *BASE_CONFIG
